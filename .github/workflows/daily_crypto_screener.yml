name: Daily Crypto Screener

on:
  schedule:
    # 매일 한국 시간 오전 09:30 (UTC 00:30) 자동 실행
    - cron: '30 0 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  run-screener:
    runs-on: ubuntu-latest

    permissions:
      contents: write # 파일 자동 커밋/저장 권한 부여

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 나눔 폰트 설치 (한글 깨짐 방지)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum
          fc-cache -fv

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 스크리너 코드 실행
        run: |
          python main.py

      - name: 결과 파일 저장 및 GitHub에 커밋
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html *.csv *.html || true
          
          # KST 기준 날짜/시간으로 커밋 메시지 생성
          KST_DATE=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')
          git commit -m "Auto: Update daily crypto screening report [$KST_DATE KST]" || exit 0
          git push
